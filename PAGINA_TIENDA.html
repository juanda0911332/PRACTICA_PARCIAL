<!-- index.html -->
<!DOCTYPE html>
<html lang="es" onload="init()">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TALLER</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="diseños.css">
</head>
<body onload="init()">
  <div class="container mt-4">
    <h1 class="text-center mb-4">Tienda Interactiva</h1>

    <form class="mb-4">
      <label for="categoria" class="form-label">Categoría de producto:</label>
      <select id="categoria" class="form-select" onchange="filtrarCategoria()">
        <option value="todos">Todos</option>
        <option value="tecnologia">Tecnología</option>
        <option value="ropa">Ropa</option>
        <option value="libros">Libros</option>
      </select>
    </form>

    <div id="productos" class="row g-4"></div>

    <div class="mt-4">
      <h5>Productos en carrito: <span id="contadorCarrito">0</span></h5>
    </div>
  </div>

  <script src="funcionalidad.js"></script>
</body>
</html>
